<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Branding - DTECH Hub</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .onboarding-container { max-width: 600px; margin: 40px auto; background: var(--bg); padding: 32px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .step-indicator { font-weight: bold; color: var(--text-light); margin-bottom: 8px; }
    .page-title { margin-bottom: 24px; }
    .btn-group { display: flex; justify-content: space-between; margin-top: 32px; }

    .upload-box { border: 2px dashed var(--border); padding: 32px; text-align: center; cursor: pointer; transition: 0.2s; background: #fafafa; }
    .upload-box:hover { border-color: var(--primary); background: #f0f0f0; }
    .preview-img { max-width: 100%; max-height: 150px; margin-top: 16px; display: none; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="dashboard.html" class="navbar-brand">DTECH Hub Editor</a>
    </div>
  </nav>

  <div class="container">
    <div class="onboarding-container">
      <div class="step-indicator">EDITOR</div>
      <h2 class="page-title">Edit Branding & Media</h2>

      <div class="form-group">
        <label class="form-label">Business Logo</label>
        <div class="upload-box" onclick="document.getElementById('logo-upload').click()">
          <p>Click to upload logo (Square)</p>
          <img id="logo-preview" class="preview-img">
        </div>
        <input type="file" id="logo-upload" style="display:none" accept="image/*">
      </div>

      <div class="form-group" style="margin-top: 32px;">
        <label class="form-label">Cover Image</label>
        <div class="upload-box" onclick="document.getElementById('cover-upload').click()">
          <p>Click to upload cover banner (Rectangle)</p>
          <img id="cover-preview" class="preview-img">
        </div>
        <input type="file" id="cover-upload" style="display:none" accept="image/*">
      </div>


      <div class="form-group" style="margin-top: 32px;">
        <label class="form-label">Gallery Images (Max 6)</label>
        <div id="gallery-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
           <!-- Gallery inputs will be injected here -->
        </div>
      </div>

      <div class="btn-group">
        <a href="editor-2-contact.html" class="btn btn-outline-dark">&larr; Back</a>
        <button class="btn btn-primary" onclick="saveAndNext()">Save & Next: Services / Products &rarr;</button>
      </div>
    </div>
  </div>

  <script>

    const WORKER_URL = 'https://late-frost-770c.nakiaklocko57.workers.dev';

    async function uploadImage(file) {
      const formData = new FormData();
      formData.append('image', file);
      const token = localStorage.getItem('dtech_token');
      const res = await fetch(`${WORKER_URL}/api/upload`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      const data = await res.json();
      if (data.success) return data.url;
      throw new Error(data.error || 'Upload failed');
    }

    function handleUpload(inputId, previewId, storageKey) {
      document.getElementById(inputId).addEventListener('change', async function(e) {
        if(e.target.files.length > 0) {
          const file = e.target.files[0];
          try {
             // Show loading state
             const box = this.parentElement;
             const origText = box.querySelector('p').innerText;
             box.querySelector('p').innerText = 'Uploading...';

             const url = await uploadImage(file);

             box.querySelector('p').innerText = origText;
             const img = document.getElementById(previewId);
             img.src = url;
             img.style.display = 'block';
             localStorage.setItem(storageKey, url);
          } catch(err) {
             alert('Error uploading image');
          }
        }
      });
    }

    handleUpload('logo-upload', 'logo-preview', 'onboarding_logo');
    handleUpload('cover-upload', 'cover-preview', 'onboarding_cover');

    function renderGallery() {
       const container = document.getElementById('gallery-container');
       container.innerHTML = '';
       let gallery = JSON.parse(localStorage.getItem('onboarding_gallery') || '[]');

       for(let i=0; i<6; i++) {
          const url = gallery[i] || '';
          const displayStyle = url ? 'block' : 'none';
          const html = `
            <div class="upload-box" onclick="document.getElementById('gallery-upload-${i}').click()" style="padding: 16px;">
              <p style="font-size: 0.8rem; margin-bottom: 8px;">${url ? 'Change Image' : '+ Add Image'}</p>
              <img id="gallery-preview-${i}" class="preview-img" src="${url}" style="display: ${displayStyle}; margin: 0 auto; max-height: 100px;">
            </div>
            <input type="file" id="gallery-upload-${i}" style="display:none" accept="image/*">
          `;
          container.insertAdjacentHTML('beforeend', html);
       }

       for(let i=0; i<6; i++) {
          document.getElementById(`gallery-upload-${i}`).addEventListener('change', async function(e) {
             if(e.target.files.length > 0) {
                const file = e.target.files[0];
                try {
                   const box = this.previousElementSibling;
                   box.querySelector('p').innerText = 'Uploading...';
                   const newUrl = await uploadImage(file);
                   let currentGallery = JSON.parse(localStorage.getItem('onboarding_gallery') || '[]');
                   currentGallery[i] = newUrl;
                   localStorage.setItem('onboarding_gallery', JSON.stringify(currentGallery));
                   renderGallery();
                } catch(err) {
                   alert('Error uploading gallery image');
                   renderGallery();
                }
             }
          });
       }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const isEditor = window.location.pathname.includes('editor');
      if (isEditor) {
         // Re-map storage keys for editor
         ['logo', 'cover', 'gallery'].forEach(k => {
             const val = localStorage.getItem(`editor_${k}`);
             if (val) localStorage.setItem(`onboarding_${k}`, val);
         });
      }

      const savedLogo = localStorage.getItem('onboarding_logo');
      const savedCover = localStorage.getItem('onboarding_cover');

      if(savedLogo) {
        const img = document.getElementById('logo-preview');
        img.src = savedLogo;
        img.style.display = 'block';
      }
      if(savedCover) {
        const img = document.getElementById('cover-preview');
        img.src = savedCover;
        img.style.display = 'block';
      }

      renderGallery();
    });

    function saveAndNext() {
      const isEditor = window.location.pathname.includes('editor');
      if (isEditor) {
         ['logo', 'cover', 'gallery'].forEach(k => {
             const val = localStorage.getItem(`onboarding_${k}`);
             if (val) localStorage.setItem(`editor_${k}`, val);
         });
         window.location.href = 'editor-4-listings.html';
      } else {
         window.location.href = 'onboarding-4-listings.html';
      }
    }

  </script>
</body>
</html>
