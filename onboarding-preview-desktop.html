<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Desktop Preview</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { background: white; }
    .preview-header { background: #333; color: white; padding: 12px; text-align: center; position: sticky; top: 0; z-index: 999; }
    .mock-site { max-width: 1200px; margin: 0 auto; border: 1px solid var(--border); min-height: 100vh; }
    .mock-hero { height: 300px; background: #ddd; background-size: cover; background-position: center; position: relative; }
    .mock-logo { width: 120px; height: 120px; background: white; border: 4px solid white; position: absolute; bottom: -60px; left: 40px; background-size: cover; }
    .mock-content { padding: 80px 40px 40px; }
  </style>
</head>
<body>
  <div class="preview-header">
    Desktop Preview Mode <button onclick="window.close()" style="margin-left: 16px;">Close Preview</button>
  </div>

  <div class="mock-site" id="site">
    <div class="mock-hero" id="p-cover">
      <div class="mock-logo" id="p-logo"></div>
    </div>
    <div class="mock-content">
      <h1 id="p-name">Business Name</h1>
      <p style="color: var(--text-light); font-size: 1.2rem; margin-bottom: 24px;" id="p-tagline">Tagline goes here.</p>

      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 40px;">
        <div>
          <div id="sec-about">
            <h3>About Us</h3>
            <p id="p-desc">Description goes here.</p>
          </div>

          <div id="sec-listings" style="margin-top: 40px;">
            <h3>Our Services</h3>
            <div id="p-listings" style="display: grid; gap: 16px;"></div>
          </div>
        </div>

        <div>
          <div class="card" style="padding: 24px;">
            <h3>Contact Us</h3>
            <p><strong>Phone:</strong> <span id="p-phone"></span></p>
            <p><strong>Email:</strong> <span id="p-email"></span></p>
            <p><strong>Location:</strong> <span id="p-province"></span></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Allow preview to work for both onboarding and editor flows
      const isEditor = window.location.href.includes('editor') || document.referrer.includes('editor');
      const prefix = isEditor ? 'editor_' : 'onboarding_';

      const basic = JSON.parse(localStorage.getItem(prefix + 'basic') || '{}');
      const contact = JSON.parse(localStorage.getItem(prefix + 'contact') || '{}');
      const listings = JSON.parse(localStorage.getItem(prefix + 'listings') || '[]');
      const sections = JSON.parse(localStorage.getItem(prefix + 'sections') || '{}');

      document.getElementById('p-name').innerText = basic.name || 'Business Name';
      document.getElementById('p-tagline').innerText = basic.tagline || 'Tagline';
      document.getElementById('p-desc').innerText = basic.description || 'Description';

      document.getElementById('p-phone').innerText = contact.phone || 'N/A';
      document.getElementById('p-email').innerText = contact.email || 'N/A';
      document.getElementById('p-province').innerText = contact.province || 'N/A';

      const logo = localStorage.getItem(prefix + 'logo');
      const cover = localStorage.getItem(prefix + 'cover');
      if(logo) document.getElementById('p-logo').style.backgroundImage = `url(${logo})`;
      if(cover) document.getElementById('p-cover').style.backgroundImage = `url(${cover})`;

      if(sections.about === false) document.getElementById('sec-about').style.display = 'none';
      if(sections.listings === false) document.getElementById('sec-listings').style.display = 'none';
      if(sections.hero === false) document.getElementById('p-cover').style.display = 'none';

      const lContainer = document.getElementById('p-listings');
      listings.forEach(l => {
        lContainer.innerHTML += `
          <div style="border: 1px solid var(--border); padding: 16px; background: #fafafa;">
            <div style="display: flex; justify-content: space-between; font-weight: bold;">
              <span>${l.name}</span>
              <span style="color: var(--primary);">R${l.price}</span>
            </div>
            <p style="font-size: 0.9rem; color: var(--text-light); margin-top: 8px;">${l.desc}</p>
          </div>
        `;
      });
    });
  </script>
</body>
</html>
