<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding - DTECH Hub</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .progress-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 32px;
      position: relative;
    }
    .progress-bar::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--border);
      z-index: 0;
    }
    .step {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      z-index: 1;
      position: relative;
    }
    .step.active {
      border-color: var(--primary);
      color: var(--primary);
    }
    .step.completed {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
  </style>
  <script src="/js/dashboard.js"></script>
  <script src="/js/onboarding.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">DTECH Hub</a>
    </div>
  </nav>

  <div class="container" style="max-width: 600px; margin-top: 48px;">
    <div class="progress-bar">
      <div class="step completed">1</div>
      <div class="step active">2</div>
      <div class="step">3</div>
      <div class="step">4</div>
    </div>

    <div class="card" style="padding: 32px;">
      <h2 style="margin-bottom: 8px;">Business Profile</h2>
      <p style="color: var(--text-light); margin-bottom: 24px;">Let's get your business set up on the directory.</p>

      <form>
        <div class="form-group">
          <label class="form-label">Business Name</label>
          <input type="text" class="form-control" placeholder="e.g. Sarah's Nails" required>
        </div>
        <div class="form-group">
          <label class="form-label">Custom URL Slug</label>
          <div style="display: flex; align-items: center;">
            <span style="background: var(--bg-offset); padding: 10px; border: 1px solid var(--border); border-right: none; border-radius: var(--radius) 0 0 var(--radius); color: var(--text-light);">dtech.com/</span>
            <input type="text" class="form-control" placeholder="sarahs-nails" style="border-radius: 0 var(--radius) var(--radius) 0;" required>
          </div>
          <small style="color: var(--text-light); display: block; margin-top: 4px;">This will be your unique website link.</small>
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-control" required>
            <option value="">Select a category...</option>
            <option value="beauty">Beauty</option>
            <option value="food">Food</option>
            <option value="tutor">Tutoring</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Province</label>
          <select class="form-control" required>
            <option value="">Select province...</option>
            <option value="gauteng">Gauteng</option>
            <option value="limpopo">Limpopo</option>
          </select>
        </div>

        <div style="display: flex; justify-content: space-between; margin-top: 32px;">
          <button type="button" class="btn btn-outline">Back</button>
          <button type="button" class="btn btn-primary">Next Step</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
