<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - DTECH Hub</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .data-table th, .data-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .data-table th {
      background: var(--bg-offset);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container" style="display: flex; justify-content: space-between;">
      <a href="/" class="navbar-brand">DTECH Admin</a>
      <div class="nav-links">
        <a href="#" class="btn btn-outline" style="border: none;">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container dashboard-layout">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="#overview" class="sidebar-link active">Overview</a>
        <a href="#applications" class="sidebar-link">Applications</a>
        <a href="#businesses" class="sidebar-link">Business Manager</a>
      </nav>
    </aside>

    <main class="dashboard-content">
      <h2>Applications</h2>
      <p style="margin-bottom: 24px; color: var(--text-light);">Review pending student business submissions.</p>

      <table class="data-table">
        <thead>
          <tr>
            <th>Business Name</th>
            <th>Owner</th>
            <th>Category</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>John Designs</td>
            <td>john@student.com</td>
            <td>Creative</td>
            <td><span class="badge" style="background: var(--warning); color: #fff;">Pending</span></td>
            <td>
              <button class="btn btn-primary" style="padding: 4px 8px; font-size: 0.85rem;">Review</button>
            </td>
          </tr>
        </tbody>
      </table>
    </main>
  </div>
</body>
</html>
