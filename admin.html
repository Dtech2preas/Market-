<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - DTECH Hub</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container" style="display: flex; justify-content: space-between;">
      <a href="/" class="navbar-brand">DTECH Admin</a>
      <div class="nav-links">
        <a href="#" class="btn btn-outline" style="border: none;">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container dashboard-layout">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="admin.html" class="sidebar-link active">Overview</a>
        <a href="admin-pending.html" class="sidebar-link">Pending Applications</a>
        <a href="admin-approved.html" class="sidebar-link">Active Businesses</a>
      </nav>
    </aside>

    <main class="dashboard-content">
      <h2>Platform Overview</h2>
      <p style="margin-bottom: 24px; color: var(--text-light);">High level metrics and status of the DTECH Business Hub.</p>

      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px;">
        <div class="card" style="padding: 24px; text-align: center;">
          <h3 id="total-businesses" style="font-size: 2rem;">0</h3>
          <p style="font-weight: bold; color: var(--text-light);">Total Submissions</p>
        </div>
        <div class="card" style="padding: 24px; text-align: center; border-bottom: 4px solid var(--warning);">
          <h3 id="pending-count" style="font-size: 2rem; color: var(--warning);">0</h3>
          <p style="font-weight: bold; color: var(--text-light);">Awaiting Review</p>
          <a href="admin-pending.html" class="btn btn-outline-dark" style="margin-top: 16px; width: 100%;">View Pending</a>
        </div>
        <div class="card" style="padding: 24px; text-align: center; border-bottom: 4px solid var(--success);">
          <h3 id="approved-count" style="font-size: 2rem; color: var(--success);">0</h3>
          <p style="font-weight: bold; color: var(--text-light);">Active Businesses</p>
          <a href="admin-approved.html" class="btn btn-outline-dark" style="margin-top: 16px; width: 100%;">Manage Active</a>
        </div>
      </div>
    </main>
  </div>

  <script>
    const WORKER_URL = 'https://late-frost-770c.nakiaklocko57.workers.dev';

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch(`${WORKER_URL}/admin/businesses`);
        if (!response.ok) throw new Error('Failed to fetch');
        const businesses = await response.json();

        document.getElementById('total-businesses').textContent = businesses.length;
        document.getElementById('pending-count').textContent = businesses.filter(b => b.status === 'pending').length;
        document.getElementById('approved-count').textContent = businesses.filter(b => b.status === 'approved' || b.status === 'verified').length;
      } catch (error) {
        console.error('Error fetching stats:', error);
      }
    });
  </script>
</body>
</html>
