<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DTECH Student Business Hub</title>
  <link rel="stylesheet" href="/styles.css">

</head>
<body>
  <header style="text-align: center; padding: 40px 20px; background: var(--surface); border-bottom: 1px solid var(--border);">
    <h1 style="margin: 0 0 20px 0; font-size: 2rem; color: var(--text);">D-TECH STUDENT BUSINESSES</h1>
    <a href="/login.html" class="btn btn-primary" style="display: inline-block;">List Your Business</a>
  </header>

  <main class="container" id="marketplace">
    <div class="filter-bar">
      <div class="filter-pill active">All Businesses</div>
      <div class="filter-pill">Beauty</div>
      <div class="filter-pill">Food</div>
      <div class="filter-pill">Tutoring</div>
      <div class="filter-pill">Tech</div>
      <div class="filter-pill">Creative</div>
      <select class="filter-pill" style="margin-left: auto;">
        <option value="">All Provinces</option>
        <option value="gauteng">Gauteng</option>
        <option value="limpopo">Limpopo</option>
      </select>
    </div>

    <div class="featured-section" id="featured-section" style="display: none;">
      <div class="featured-header">
        <h2>Featured Businesses</h2>
        <span class="featured-badge">Top Picks</span>
      </div>
      <div class="marketplace-grid" id="featured-container">
        <!-- Featured cards injected here -->
      </div>
    </div>

    <div class="marketplace-grid" id="marketplace-container">
      <!-- Cards injected via JS -->
    </div>
  </main>

  <!-- Full Screen Preview Overlay -->
  <div class="fs-overlay" id="preview-modal">
    <div class="fs-header">
      <button class="fs-close" onclick="closeModal()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>

    <div class="fs-container">
      <div class="mock-hero" id="p-cover">
        <div class="mock-logo" id="p-logo"></div>
      </div>

      <div class="mock-content">
        <h2 id="p-name">Business Name</h2>
        <p id="p-tagline">Tagline goes here.</p>

        <div id="sec-about">
          <h4>About Us</h4>
          <p id="p-desc" style="font-size:.95rem;">
            Description goes here.
          </p>
        </div>

        <div id="sec-listings">
          <h4>Our Services</h4>
          <div id="p-listings"></div>
        </div>

        <div class="card">
          <h4>Contact</h4>
          <p><strong>Phone:</strong> <span id="p-phone"></span></p>
          <p><strong>Email:</strong> <span id="p-email"></span></p>
        </div>
      </div>
    </div>
  </div>



<script>
// --- js/main.js ---
// Basic logic for the marketplace UI
document.addEventListener('DOMContentLoaded', () => {
  const filterPills = document.querySelectorAll('.filter-pill:not(select)');

  filterPills.forEach(pill => {
    pill.addEventListener('click', (e) => {
      filterPills.forEach(p => p.classList.remove('active'));
      e.target.classList.add('active');
      // Later: trigger fetch/filter logic here based on pill text
    });
  });

  // Intercept back button for modal
  window.addEventListener('popstate', (e) => {
    const modal = document.getElementById('preview-modal');
    if (modal.classList.contains('active')) {
      closeModal(true);
    }
  });

  // Example script to mock dynamic data insertion later
  console.log("DTECH Main JS Loaded");
});

// --- Modal Logic ---
async function openModal(slug, name) {
  const modal = document.getElementById('preview-modal');
  modal.classList.add('active');
  document.body.style.overflow = 'hidden'; // Prevent background scrolling

  // Reset content to loading state
  document.getElementById('p-name').innerText = 'Loading...';
  document.getElementById('p-tagline').innerText = '';
  document.getElementById('p-desc').innerText = '';
  document.getElementById('p-phone').innerText = '';
  document.getElementById('p-email').innerText = '';
  document.getElementById('p-logo').style.backgroundImage = 'none';
  document.getElementById('p-cover').style.backgroundImage = 'none';
  document.getElementById('p-listings').innerHTML = '';
  document.getElementById('sec-about').style.display = 'block';
  document.getElementById('sec-listings').style.display = 'block';
  document.getElementById('p-cover').style.display = 'block';

  // Push a state to history so back button can be intercepted
  history.pushState({ modalOpen: true }, '', '');

  try {
    const res = await fetch(`${WORKER_URL}/api/business/${slug}`);
    const data = await res.json();

    if (data.error) {
      document.getElementById('p-name').innerText = 'Business not found';
      return;
    }

    const pub = data.publishedVersion || {};
    const basic = pub.basic || {};
    const contact = pub.contact || {};
    const branding = pub.branding || {};
    const listings = pub.listings || [];
    const sections = pub.sections || {};

    document.getElementById('p-name').innerText = basic.name || data.name || 'Business Name';
    document.getElementById('p-tagline').innerText = basic.tagline || data.category || 'Tagline';
    document.getElementById('p-desc').innerText = basic.description || 'Description';

    document.getElementById('p-phone').innerText = contact.phone || 'N/A';
    document.getElementById('p-email').innerText = contact.email || 'N/A';

    if (branding.logo) {
      document.getElementById('p-logo').style.backgroundImage = `url(${branding.logo})`;
    } else {
      document.getElementById('p-logo').style.backgroundImage = `url('https://placehold.co/100x100?text=Logo')`;
    }

    if (branding.cover) {
      document.getElementById('p-cover').style.backgroundImage = `url(${branding.cover})`;
    } else {
      document.getElementById('p-cover').style.backgroundImage = `url('https://placehold.co/400x200?text=Cover')`;
    }

    if (sections.about === false) document.getElementById('sec-about').style.display = 'none';
    if (sections.listings === false) document.getElementById('sec-listings').style.display = 'none';
    if (sections.hero === false) document.getElementById('p-cover').style.display = 'none';

    const container = document.getElementById('p-listings');
    container.innerHTML = '';

    if (listings.length > 0) {
      listings.forEach(item => {
        const card = document.createElement('div');
        card.className = 'listing-card';

        const header = document.createElement('div');
        header.className = 'listing-header';

        const nameSpan = document.createElement('span');
        nameSpan.textContent = item.name || item.title || 'Service';

        const priceSpan = document.createElement('span');
        priceSpan.className = 'listing-price';
        priceSpan.textContent = 'R' + (item.price || '0');

        header.appendChild(nameSpan);
        header.appendChild(priceSpan);

        const desc = document.createElement('div');
        desc.className = 'listing-desc';
        desc.textContent = item.desc || item.description || '';

        card.appendChild(header);
        card.appendChild(desc);

        container.appendChild(card);
      });
    } else {
      container.innerHTML = '<p>No services listed.</p>';
    }
  } catch (error) {
    document.getElementById('p-name').innerText = 'Error loading profile';
  }
}

function closeModal(fromPopState = false) {
  const modal = document.getElementById('preview-modal');
  modal.classList.remove('active');
  document.body.style.overflow = '';

  // If closed programmatically (not by browser back button), go back to clear state
  if (!fromPopState) {
    history.back();
  }
}

// Close modal on outside click
document.getElementById('preview-modal').addEventListener('click', (e) => {
  if(e.target.id === 'preview-modal') {
    closeModal();
  }
});

// Bookmark Toggle
function toggleSave(btn, event) {
  event.stopPropagation(); // Prevent opening modal
  btn.classList.toggle('saved');
  if(btn.classList.contains('saved')) {
    btn.innerHTML = '❤️';
  } else {
    btn.innerHTML = '🤍';
  }
}

// Open External Tab
function openExternal(slug, event) {
  event.stopPropagation(); // Prevent opening modal
  window.open(`https://${slug}.business.dtech-services.co.za`, '_blank');
}

// --- js/marketplace.js ---
const WORKER_URL = 'https://late-frost-770c.nakiaklocko57.workers.dev';

function generateCardHTML(b, isFeatured = false) {
  return `
    <div class="business-card ${isFeatured ? 'featured' : ''}" onclick="openModal('${b.slug}', '${b.name.replace(/'/g, "\\'")}')">
      <div class="cover" style="background-image: url('${b.coverImage || 'https://placehold.co/400x200?text=Cover'}')">
        <button class="card-save-btn" onclick="toggleSave(this, event)">🤍</button>
      </div>
      <div class="content">
        <div class="logo" style="background-image: url('https://placehold.co/100x100?text=Logo')"></div>

        <h3 class="title">${b.name}</h3>
        <span class="category-tag">${b.category}</span>

        <p class="tagline">${b.description || ''}</p>
      </div>
    </div>
  `;
}

document.addEventListener('DOMContentLoaded', async () => {
  const container = document.getElementById('marketplace-container');
  const featuredSection = document.getElementById('featured-section');
  const featuredContainer = document.getElementById('featured-container');

  if (!container) return;

  try {
    const res = await fetch(`${WORKER_URL}/api/marketplace`);
    let businesses = await res.json();

    if (!businesses || businesses.length === 0) {
      container.innerHTML = '<p style="grid-column: 1/-1; text-align:center;">No businesses found yet.</p>';
      return;
    }

    // Simulate Featured Businesses (take first 3 if available)
    if (businesses.length > 2) {
      featuredSection.style.display = 'block';
      const featured = businesses.slice(0, 3);
      featuredContainer.innerHTML = featured.map(b => generateCardHTML(b, true)).join('');
      // Show rest in main grid
      const rest = businesses.slice(3);
      container.innerHTML = rest.map(b => generateCardHTML(b)).join('');
    } else {
      // Not enough for a separate featured section
      container.innerHTML = businesses.map(b => generateCardHTML(b)).join('');
    }

  } catch (e) {
    container.innerHTML = '<p style="grid-column: 1/-1; text-align:center;">Error loading marketplace.</p>';
  }
});


</script>
</body>
</html>
