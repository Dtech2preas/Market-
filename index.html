<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DTECH Student Business Hub</title>
  <link rel="stylesheet" href="/styles.css">

</head>
<body>
  <header style="text-align: center; padding: 40px 20px; background: var(--surface); border-bottom: 1px solid var(--border);">
    <h1 style="margin: 0 0 20px 0; font-size: 2rem; color: var(--text);">D-TECH STUDENT BUSINESSES</h1>
    <a href="/login.html" class="btn btn-primary" style="display: inline-block;">List Your Business</a>
  </header>

  <main class="container" id="marketplace">
    <div class="filter-bar">
      <div class="filter-pill active">All Businesses</div>
      <div class="filter-pill">Beauty</div>
      <div class="filter-pill">Food</div>
      <div class="filter-pill">Tutoring</div>
      <div class="filter-pill">Tech</div>
      <div class="filter-pill">Creative</div>
      <select class="filter-pill" style="margin-left: auto;">
        <option value="">All Provinces</option>
        <option value="gauteng">Gauteng</option>
        <option value="limpopo">Limpopo</option>
      </select>
    </div>

    <div class="featured-section" id="featured-section" style="display: none;">
      <div class="featured-header">
        <h2>Featured Businesses</h2>
        <span class="featured-badge">Top Picks</span>
      </div>
      <div class="marketplace-grid" id="featured-container">
        <!-- Featured cards injected here -->
      </div>
    </div>

    <div class="marketplace-grid" id="marketplace-container">
      <!-- Cards injected via JS -->
    </div>
  </main>

  <script>
// --- js/main.js ---
// Basic logic for the marketplace UI
document.addEventListener('DOMContentLoaded', () => {
  const filterPills = document.querySelectorAll('.filter-pill:not(select)');

  filterPills.forEach(pill => {
    pill.addEventListener('click', (e) => {
      filterPills.forEach(p => p.classList.remove('active'));
      e.target.classList.add('active');
      // Later: trigger fetch/filter logic here based on pill text
    });
  });

    // Example script to mock dynamic data insertion later
  console.log("DTECH Main JS Loaded");
});

// Bookmark Toggle
function toggleSave(btn, event) {
  event.stopPropagation(); // Prevent opening modal
  btn.classList.toggle('saved');
  if(btn.classList.contains('saved')) {
    btn.innerHTML = '❤️';
  } else {
    btn.innerHTML = '🤍';
  }
}

// Open External Tab
function openExternal(slug, event) {
  event.stopPropagation(); // Prevent opening modal
  window.open(`https://${slug}.business.dtech-services.co.za`, '_blank');
}

// --- js/marketplace.js ---
const WORKER_URL = 'https://late-frost-770c.nakiaklocko57.workers.dev';

function generateCardHTML(b, isFeatured = false) {
  const shortDesc = b.description || b.tagline || '';
  const displayDesc = shortDesc.length > 80 ? shortDesc.substring(0, 77) + '...' : shortDesc;

  return `
    <div class="business-card ${isFeatured ? 'featured' : ''}" onclick="window.location.href='/business-profile.html?slug=${b.slug}'">
      <div class="cover" style="background-image: url('${b.coverImage || 'https://placehold.co/400x200?text=Cover'}')">
        <button class="card-save-btn" onclick="toggleSave(this, event)">🤍</button>
      </div>
      <div class="content">
        <div class="logo" style="background-image: url('${b.logo || 'https://placehold.co/100x100?text=Logo'}')"></div>

        <h3 class="title">${b.name}</h3>
        <span class="category-tag">${b.category}</span>

        <p class="tagline" style="font-size: 0.9rem; color: var(--text-light); margin-top: 8px;">${displayDesc}</p>
      </div>
    </div>
  `;
}

document.addEventListener('DOMContentLoaded', async () => {
  const container = document.getElementById('marketplace-container');
  const featuredSection = document.getElementById('featured-section');
  const featuredContainer = document.getElementById('featured-container');

  if (!container) return;

  try {
    const res = await fetch(`${WORKER_URL}/api/marketplace`);
    let businesses = await res.json();

    if (!businesses || businesses.length === 0) {
      container.innerHTML = '<p style="grid-column: 1/-1; text-align:center;">No businesses found yet.</p>';
      return;
    }

    // Simulate Featured Businesses (take first 3 if available)
    if (businesses.length > 2) {
      featuredSection.style.display = 'block';
      const featured = businesses.slice(0, 3);
      featuredContainer.innerHTML = featured.map(b => generateCardHTML(b, true)).join('');
      // Show rest in main grid
      const rest = businesses.slice(3);
      container.innerHTML = rest.map(b => generateCardHTML(b)).join('');
    } else {
      // Not enough for a separate featured section
      container.innerHTML = businesses.map(b => generateCardHTML(b)).join('');
    }

  } catch (e) {
    container.innerHTML = '<p style="grid-column: 1/-1; text-align:center;">Error loading marketplace.</p>';
  }
});


</script>
</body>
</html>
