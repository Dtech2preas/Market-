<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DTECH Student Business Hub</title>
  <link rel="stylesheet" href="/styles.css">

</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">DTECH Hub</a>
      <div class="nav-links">
        <a href="/login.html" class="btn btn-outline">Log In</a>
        <a href="/register.html" class="btn btn-primary">Sign Up</a>
      </div>
    </div>
  </nav>

  <div class="hero">
    <div class="container">
      <h1>Discover Student Businesses</h1>
      <p>Support your peers and find amazing services on campus.</p>
    </div>
  </div>

  <main class="container">
    <div class="filter-bar">
      <div class="filter-pill active">All</div>
      <div class="filter-pill">Beauty</div>
      <div class="filter-pill">Food</div>
      <div class="filter-pill">Tutoring</div>
      <div class="filter-pill">Tech</div>
      <div class="filter-pill">Creative</div>
      <select class="filter-pill" style="margin-left: auto;">
        <option value="">All Provinces</option>
        <option value="gauteng">Gauteng</option>
        <option value="limpopo">Limpopo</option>
      </select>
    </div>

    <div class="marketplace-grid" id="marketplace-container">
      <!-- Cards injected via JS -->
      <div class="card business-card">
        <div class="cover" style="background-image: url('https://placehold.co/400x200')"></div>
        <div class="content">
          <div class="logo" style="background-image: url('https://placehold.co/100x100')"></div>
          <h3 class="title">Sarah's Nails</h3>
          <div class="category">Beauty • Gauteng</div>
          <span class="badge badge-verified">✓ Verified Student</span>
          <a href="/sarahs-nails" class="btn btn-outline" style="width: 100%; margin-top: 16px;">View Profile</a>
        </div>
      </div>
    </div>
  </main>



<script>
// --- js/main.js ---
// Basic logic for the marketplace UI
document.addEventListener('DOMContentLoaded', () => {
  const filterPills = document.querySelectorAll('.filter-pill:not(select)');

  filterPills.forEach(pill => {
    pill.addEventListener('click', (e) => {
      filterPills.forEach(p => p.classList.remove('active'));
      e.target.classList.add('active');
      // Later: trigger fetch/filter logic here based on pill text
    });
  });

  // Example script to mock dynamic data insertion later
  console.log("DTECH Main JS Loaded");
});

// --- js/marketplace.js ---
const WORKER_URL = 'https://late-frost-770c.nakiaklocko57.workers.dev';

document.addEventListener('DOMContentLoaded', async () => {
  const container = document.getElementById('marketplace-container');
  if (!container) return;

  try {
    const res = await fetch(`${WORKER_URL}/api/marketplace`);
    const businesses = await res.json();

    if (businesses.length === 0) {
      container.innerHTML = '<p>No businesses found yet.</p>';
      return;
    }

    container.innerHTML = businesses.map(b => `
      <div class="card business-card">
        <div class="cover" style="background-image: url('${b.coverImage || 'https://placehold.co/400x200'}')"></div>
        <div class="content">
          <div class="logo" style="background-image: url('https://placehold.co/100x100')"></div>
          <h3 class="title">${b.name}</h3>
          <div class="category">${b.category} • ${b.province}</div>
          ${b.status === 'verified' ? '<span class="badge badge-verified">✓ Verified Student</span>' : ''}
          <a href="https://${b.slug}.business.dtech-services.co.za" class="btn btn-outline" style="width: 100%; margin-top: 16px;">View Profile</a>
        </div>
      </div>
    `).join('');
  } catch (e) {
    container.innerHTML = '<p>Error loading marketplace.</p>';
  }
});


</script>
</body>
</html>
