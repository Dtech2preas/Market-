<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DTECH Hub</title>
  <link rel="stylesheet" href="/styles.css">

</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">DTECH Hub</a>
    </div>
  </nav>

  <div class="container">
    <div class="auth-container">
      <h2 style="margin-bottom: 24px; text-align: center;">Welcome Back</h2>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
      </form>
      <p style="text-align: center; margin-top: 16px;">
        Don't have an account? <a href="/register.html">Sign up</a>
      </p>
    </div>
  </div>
<script>
// --- js/auth.js ---
const WORKER_URL = 'https://late-frost-770c.nakiaklocko57.workers.dev';

document.addEventListener('DOMContentLoaded', () => {
  const loginForm = document.getElementById('loginForm');
  if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = loginForm.querySelector('input[type="email"]').value;
      const password = loginForm.querySelector('input[type="password"]').value;

      try {
        const res = await fetch(`${WORKER_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.token) {
          localStorage.setItem('dtech_token', data.token);
          window.location.href = '/dashboard.html';
        } else {
          alert(data.error || 'Login failed');
        }
      } catch (err) {
        alert('Network error. Please try again.');
      }
    });
  }
});
</script>
</body>
</html>
