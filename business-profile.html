<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Profile...</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      /* Base container width/margins like fs-container */
    }
    .fs-container {
      max-width: 800px;
      margin: 0 auto;
      background: #ffffff;
      min-height: 100vh;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <!-- Full Screen Preview Content -->
  <div class="fs-container" id="profile-container">
    <div class="mock-hero" id="p-cover">
      <div class="mock-logo" id="p-logo"></div>
    </div>

    <div class="mock-content" style="padding: 24px;">
      <h2 id="p-name">Loading...</h2>
      <p id="p-tagline"></p>

      <div id="p-actions" style="margin: 16px 0;"></div>

      <div id="sec-about">
        <h4>About Us</h4>
        <p id="p-desc" style="font-size:.95rem;"></p>
      </div>

      <div id="sec-gallery" style="margin-top: 24px; display: none;">
        <h4>Gallery</h4>
        <div id="p-gallery" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-top: 8px;"></div>
      </div>

      <div id="sec-listings" style="margin-top: 24px;">
        <h4>Our Services</h4>
        <div id="p-listings" style="display: flex; flex-direction: column; gap: 16px; margin-top: 8px;"></div>
      </div>

      <div class="card" style="margin-top: 24px; padding: 16px;">
        <h4>Contact</h4>
        <p style="margin-bottom: 8px;"><strong>The Owner:</strong> <span id="p-owner"></span></p>
        <p style="margin-bottom: 8px;"><strong>Contact Call:</strong> <span id="p-phone"></span></p>
        <p style="margin-bottom: 8px;"><strong>WhatsApp Number:</strong> <span id="p-whatsapp"></span></p>
        <p style="margin-bottom: 8px;"><strong>Email:</strong> <span id="p-email"></span></p>
        <p style="margin-bottom: 8px;"><strong>Business Address:</strong> <span id="p-address"></span></p>
      </div>
    </div>
  </div>

  <!-- Image Lightbox Overlay -->
  <div id="image-lightbox" class="lightbox-overlay" onclick="closeLightbox(event)">
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="Full screen image">
      <button class="lightbox-close" onclick="closeLightbox(event)">&times;</button>
    </div>
  </div>

<script>
const WORKER_URL = 'https://late-frost-770c.nakiaklocko57.workers.dev';

// Lightbox Logic
function openLightbox(imgSrc) {
  const lightbox = document.getElementById('image-lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  lightboxImg.src = imgSrc;
  lightbox.classList.add('active');
  document.body.style.overflow = 'hidden'; // Prevent background scroll
}

function closeLightbox(event) {
  if (event && event.target.id === 'lightbox-img') return;
  const lightbox = document.getElementById('image-lightbox');
  lightbox.classList.remove('active');
  document.getElementById('lightbox-img').src = '';
  document.body.style.overflow = '';
}

document.addEventListener('DOMContentLoaded', async () => {
  const urlParams = new URLSearchParams(window.location.search);
  const slug = urlParams.get('slug');

  if (!slug) {
    document.getElementById('p-name').innerText = 'No business specified.';
    return;
  }

  try {
    const res = await fetch(`${WORKER_URL}/api/business/${slug}`);
    const data = await res.json();

    if (data.error) {
      document.getElementById('p-name').innerText = 'Business not found';
      return;
    }

    const pub = data.publishedVersion || {};
    const basic = pub.basic || {};
    const contact = pub.contact || {};
    const branding = pub.branding || {};
    const listings = pub.listings || [];
    const sections = pub.sections || {};

    document.title = (basic.name || data.name || 'Business') + ' - DTECH Hub';

    document.getElementById('p-name').innerText = basic.name || data.name || 'Business Name';
    document.getElementById('p-tagline').innerText = basic.tagline || data.category || 'Tagline';
    document.getElementById('p-desc').innerText = basic.description || 'Description';

    document.getElementById('p-owner').innerText = basic.ownerName || 'N/A';
    document.getElementById('p-phone').innerText = contact.phone || 'N/A';
    document.getElementById('p-whatsapp').innerText = contact.whatsapp || 'N/A';
    document.getElementById('p-email').innerText = contact.email || 'N/A';
    document.getElementById('p-address').innerText = contact.address || 'N/A';

    if (branding.logo) {
      document.getElementById('p-logo').style.backgroundImage = `url(${branding.logo})`;
      document.getElementById('p-logo').onclick = () => openLightbox(branding.logo);
      document.getElementById('p-logo').style.cursor = 'pointer';
    } else {
      document.getElementById('p-logo').style.backgroundImage = `url('https://placehold.co/100x100?text=Logo')`;
      document.getElementById('p-logo').onclick = null;
      document.getElementById('p-logo').style.cursor = 'default';
    }

    if (branding.cover) {
      document.getElementById('p-cover').style.backgroundImage = `url(${branding.cover})`;
      document.getElementById('p-cover').onclick = (e) => {
        if (e.target.id === 'p-cover') openLightbox(branding.cover);
      };
      document.getElementById('p-cover').style.cursor = 'pointer';
    } else {
      document.getElementById('p-cover').style.backgroundImage = `url('https://placehold.co/400x200?text=Cover')`;
      document.getElementById('p-cover').onclick = null;
      document.getElementById('p-cover').style.cursor = 'default';
    }

    const ctaType = (pub.cta && pub.cta.primary) ? pub.cta.primary : 'WhatsApp Us';
    const waNumber = (contact.whatsapp || '').replace(/[^0-9]/g, '');
    const emailAddress = contact.email || '';

    let mainCtaLink = '';
    let mainCtaColor = 'var(--primary)';

    if (ctaType.toLowerCase().includes('whatsapp') && waNumber) {
      const waMsg = encodeURIComponent(`Hi, I am interested in your business ${basic.name || data.name} listed on DTECH Student Business Hub.`);
      mainCtaLink = `https://wa.me/${waNumber}?text=${waMsg}`;
      mainCtaColor = '#25d366';
    } else if (ctaType.toLowerCase().includes('email') && emailAddress) {
      const emailSubj = encodeURIComponent(`Inquiry from DTECH Student Business Hub`);
      const emailBody = encodeURIComponent(`Hi,\n\nI found your business ${basic.name || data.name} on DTECH Student Business Hub and I am interested in learning more.`);
      mainCtaLink = `mailto:${emailAddress}?subject=${emailSubj}&body=${emailBody}`;
    } else if (waNumber) {
      const waMsg = encodeURIComponent(`Hi, I am interested in your business ${basic.name || data.name} listed on DTECH Student Business Hub.`);
      mainCtaLink = `https://wa.me/${waNumber}?text=${waMsg}`;
      mainCtaColor = '#25d366';
    } else if (emailAddress) {
      mainCtaLink = `mailto:${emailAddress}`;
    }

    if (mainCtaLink) {
      const btn = document.createElement('a');
      btn.href = mainCtaLink;
      btn.target = "_blank";
      btn.className = "btn btn-primary";
      btn.style.cssText = `width: 100%; text-align: center; background-color: ${mainCtaColor}; border-color: ${mainCtaColor}; color: #ffffff; display: block;`;
      btn.textContent = ctaType;
      document.getElementById('p-actions').appendChild(btn);
    }

    if (sections.about === false) document.getElementById('sec-about').style.display = 'none';
    if (sections.listings === false) document.getElementById('sec-listings').style.display = 'none';
    if (sections.hero === false) document.getElementById('p-cover').style.display = 'none';

    const galleryContainer = document.getElementById('p-gallery');
    galleryContainer.innerHTML = '';
    if (branding.gallery && branding.gallery.length > 0 && sections.gallery !== false) {
      document.getElementById('sec-gallery').style.display = 'block';
      branding.gallery.filter(Boolean).forEach(imgUrl => {
        galleryContainer.innerHTML += `<div onclick="openLightbox('${imgUrl}')" style="background-image: url('${imgUrl}'); background-size: cover; background-position: center; height: 100px; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer;"></div>`;
      });
    }

    const container = document.getElementById('p-listings');
    container.innerHTML = '';

    if (listings.length > 0) {
      listings.forEach(item => {
        let priceDisplay = '';
        if (item.priceType === 'Free Quote') priceDisplay = 'Free Quote';
        else if (item.priceType === 'From') priceDisplay = `From R${item.price} - R${item.priceMax}`;
        else if (item.priceType === 'Hourly') priceDisplay = `R${item.price} / hour`;
        else priceDisplay = `R${item.price || '0'}`;

        const card = document.createElement('div');
        card.className = 'listing-card';
        card.style.border = '1px solid var(--border)';
        card.style.borderRadius = 'var(--radius)';
        card.style.overflow = 'hidden';
        card.style.backgroundColor = 'var(--bg)';

        if (item.image) {
          const imgDiv = document.createElement('div');
          imgDiv.style.cssText = `width: 100%; height: 150px; background-image: url('${item.image.replace(/'/g, "%27")}'); background-size: cover; background-position: center; border-radius: var(--radius) var(--radius) 0 0; cursor: pointer;`;
          imgDiv.onclick = (e) => {
             e.stopPropagation();
             openLightbox(item.image);
          };
          card.appendChild(imgDiv);
        }

        const contentDiv = document.createElement('div');
        contentDiv.style.padding = '16px';

        const headerDiv = document.createElement('div');
        headerDiv.style.cssText = 'display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;';

        const titleStrong = document.createElement('strong');
        titleStrong.style.fontSize = '1.05rem';
        titleStrong.textContent = item.name || item.title || 'Service';

        const priceSpan = document.createElement('span');
        priceSpan.style.cssText = 'color: var(--primary); font-weight: bold; white-space: nowrap; margin-left: 12px;';
        priceSpan.textContent = priceDisplay;

        headerDiv.appendChild(titleStrong);
        headerDiv.appendChild(priceSpan);
        contentDiv.appendChild(headerDiv);

        if (item.category) {
          const catSpan = document.createElement('span');
          catSpan.className = 'badge';
          catSpan.style.cssText = 'background: #e9ecef; color: #495057; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 8px; display: inline-block;';
          catSpan.textContent = item.category;
          contentDiv.appendChild(catSpan);
        }

        const descDiv = document.createElement('div');
        descDiv.style.cssText = 'font-size: 0.9rem; color: var(--text-light); margin-bottom: 8px;';
        descDiv.textContent = item.desc || item.description || '';
        contentDiv.appendChild(descDiv);

        let itemCtaLink = '';
        if (ctaType.toLowerCase().includes('whatsapp') && waNumber) {
          const itemWaMsg = encodeURIComponent(`Hi, I am interested in ${item.name || 'this item'} (${priceDisplay}) listed on your DTECH profile.`);
          itemCtaLink = `https://wa.me/${waNumber}?text=${itemWaMsg}`;
        } else if (ctaType.toLowerCase().includes('email') && emailAddress) {
          const itemEmailSubj = encodeURIComponent(`Inquiry regarding ${item.name || 'this item'}`);
          const itemEmailBody = encodeURIComponent(`Hi,\n\nI saw ${item.name || 'this item'} (${priceDisplay}) on your DTECH profile and I would like more information.`);
          itemCtaLink = `mailto:${emailAddress}?subject=${itemEmailSubj}&body=${itemEmailBody}`;
        } else if (waNumber) {
          const itemWaMsg = encodeURIComponent(`Hi, I am interested in ${item.name || 'this item'} (${priceDisplay}) listed on your DTECH profile.`);
          itemCtaLink = `https://wa.me/${waNumber}?text=${itemWaMsg}`;
        } else if (emailAddress) {
          const itemEmailSubj = encodeURIComponent(`Inquiry regarding ${item.name || 'this item'}`);
          const itemEmailBody = encodeURIComponent(`Hi,\n\nI saw ${item.name || 'this item'} (${priceDisplay}) on your DTECH profile and I would like more information.`);
          itemCtaLink = `mailto:${emailAddress}?subject=${itemEmailSubj}&body=${itemEmailBody}`;
        }

        if (itemCtaLink) {
          const ctaBtn = document.createElement('a');
          ctaBtn.href = itemCtaLink;
          ctaBtn.target = "_blank";
          ctaBtn.className = "btn btn-outline-dark";
          ctaBtn.style.cssText = 'display: block; text-align: center; margin-top: 12px; font-size: 0.9rem;';
          ctaBtn.textContent = ctaType;
          contentDiv.appendChild(ctaBtn);
        }

        card.appendChild(contentDiv);
        container.appendChild(card);
      });
    } else {
      container.innerHTML = '<p>No services listed.</p>';
    }
  } catch (error) {
    document.getElementById('p-name').innerText = 'Error loading profile';
  }
});
</script>
</body>
</html>
