<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Profile - DTECH Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="index.html" style="color:white; text-decoration:none;">DTECH Business Hub</a></h1>
        </div>
    </header>

    <main class="container">
        <div id="loading" class="loading">Loading business profile...</div>

        <div id="business-profile" class="profile-container" style="display:none;">
            <div class="profile-header">
                <img id="biz-logo" src="" alt="Business Logo" class="profile-logo">
                <div class="profile-title">
                    <h2 id="biz-name">Business Name</h2>
                    <p class="biz-meta"><span id="biz-category" class="badge">Category</span> | <span id="biz-province">Province</span></p>
                    <p>Owned by: <span id="biz-owner">Owner Name</span></p>
                </div>
            </div>

            <div class="profile-actions">
                <a id="biz-whatsapp" href="#" target="_blank" class="btn btn-whatsapp">Contact on WhatsApp</a>
            </div>

            <div class="profile-content">
                <section class="profile-section">
                    <h3>About Us</h3>
                    <p id="biz-about">About content goes here...</p>
                    <p id="biz-school-container" style="display:none; margin-top: 10px; font-style: italic;">
                        Student at: <span id="biz-school"></span>
                    </p>
                </section>

                <section class="profile-section">
                    <h3>Services / Products</h3>
                    <p id="biz-services">Services content...</p>
                </section>

                <section class="profile-section" id="biz-social-container" style="display:none;">
                    <h3>Social Links</h3>
                    <p id="biz-social"></p>
                </section>

                <section class="profile-section" id="biz-gallery-container" style="display:none;">
                    <h3>Gallery</h3>
                    <div id="biz-gallery" class="gallery-grid" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
                </section>
            </div>
        </div>

        <div id="error-message" class="status-message error" style="display:none;">
            Business not found.
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 DTECH Student Business Hub.</p>
        </div>
    </footer>

    <script src="js/business.js"></script>
</body>
</html>
